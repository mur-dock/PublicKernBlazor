name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Build, Test & NuGet-Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write   # für GitHub-Release erstellen
      packages: write   # für GitHub Packages (optional)
      id-token: write   # für OIDC-basiertes Trusted Publishing auf nuget.org

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: .NET einrichten
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: NuGet-Pakete wiederherstellen
        run: dotnet restore PublicKernBlazor.slnx

      - name: Solution bauen (Release)
        run: dotnet build PublicKernBlazor.slnx --configuration Release --no-restore

      - name: Unit-Tests ausführen
        run: >
          dotnet test tests/PublicKernBlazor.Components.Tests/PublicKernBlazor.Components.Tests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./test-results

      - name: NuGet-Paket erstellen
        run: >
          dotnet pack src/PublicKernBlazor.Components/PublicKernBlazor.Components.csproj
          --configuration Release
          --no-build
          --output ./nupkg

      - name: Paketversionsnummer aus Tag ableiten
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: NuGet Login (OIDC -> temporärer API-Key)
        id: nuget_login
        uses: NuGet/login@v1
        with:
          user: mur-dock

      - name: NuGet-Paket auf nuget.org veröffentlichen
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: GitHub-Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body: |
            Siehe [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
            für alle Änderungen dieser Version.
          files: ./nupkg/*.nupkg
          generate_release_notes: false

