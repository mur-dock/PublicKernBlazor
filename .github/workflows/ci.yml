name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Unit-Tests (.NET ${{ matrix.dotnet }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        dotnet: ["10.x"]

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: .NET ${{ matrix.dotnet }} einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: NuGet-Pakete wiederherstellen
        run: dotnet restore KernUx.Blazor.slnx

      - name: Solution bauen
        run: dotnet build KernUx.Blazor.slnx --configuration Release --no-restore

      - name: Unit-Tests ausführen
        run: >
          dotnet test tests/KernUx.Blazor.Tests/KernUx.Blazor.Tests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./test-results

      - name: Test-Ergebnisse hochladen
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.dotnet }}
          path: test-results/*.trx
          retention-days: 14

      - name: NuGet-Paket erstellen (Smoke-Check)
        run: >
          dotnet pack src/KernUx.Blazor/KernUx.Blazor.csproj
          --configuration Release
          --no-build
          --output ./nupkg

